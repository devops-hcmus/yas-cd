name: promotion service ci

on:
  push:
    paths:
      - "promotion/**"
      - ".github/workflows/actions/action.yaml"
      - ".github/workflows/promotion-ci.yaml"
      - "pom.xml"
  workflow_dispatch:

jobs:
  Build:
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions
      - name: Build
        run: mvn clean install -pl promotion -am -DskipTests
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yas-promotion
          tags: |
            type=sha,format=short,prefix=
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./promotion
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  update-gitops:
    needs: Build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_gitops-update.yaml
    with:
      service: promotion
      env: dev
      tag: ${{ needs.Build.outputs.image-tag }}
      values-key: backend
    secrets:
      gitops_pat: ${{ secrets.GITOPS_PAT }}
