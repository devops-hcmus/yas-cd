# test: concurrency group gitops-write
name: storefront service ci

on:
  push:
    paths:
      - "storefront/**"
      - ".github/workflows/storefront-ci.yaml"
  workflow_dispatch:

jobs:
  Build:
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: storefront
      - name: Build
        run: npm run build
        working-directory: storefront
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront
          tags: |
            type=sha,format=short,prefix=
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  update-gitops:
    needs: Build
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_gitops-deploy-dev.yaml
    with:
      service: storefront-ui
      env: dev
      tag: ${{ needs.Build.outputs.image-tag }}
      values-key: ui
    secrets:
      gitops_pat: ${{ secrets.GITOPS_PAT }}
