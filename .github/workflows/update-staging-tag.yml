name: Update Staging Tag in GitOps

on:
  push:
    tags:
      - 'v*'

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Extract tag name
        id: tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Read current staging replicas from state
        id: read_state
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          echo "Reading staging replicas from state.yaml for tag: $TAG"
          # Create a map of all staging services and their current replicas
          echo "staging_services=$(yq e '.staging | keys | .[]' state.yaml | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Update all staging services with restored replicas and new tag
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          echo "Updating all staging services to tag: $TAG"

          for service_dir in clusters/staging/*/; do
            service=$(basename "$service_dir")
            values_file="$service_dir/values.yaml"

            if [ -f "$values_file" ]; then
              # Read replicas from state
              REPLICAS=$(yq e ".staging.$service" state.yaml)
              if [ "$REPLICAS" = "null" ] || [ -z "$REPLICAS" ]; then
                REPLICAS=1
              fi

              # Update image tag and replicas
              yq e ".backend.image.tag = \"$TAG\"" -i "$values_file"
              yq e ".backend.replicaCount = $REPLICAS" -i "$values_file"
              echo "  ✓ $service: tag=$TAG, replicas=$REPLICAS"
            fi
          done

      - name: Scale all dev services to 0 replicas
        run: |
          echo "Scaling all dev services to 0 replicas..."
          for service_dir in clusters/dev/*/; do
            service=$(basename "$service_dir")
            values_file="$service_dir/values.yaml"

            if [ -f "$values_file" ]; then
              yq e ".backend.replicaCount = 0" -i "$values_file"
              echo "  ✓ $service: replicaCount = 0"
            fi
          done

      - name: Save staging replicas to state
        run: |
          echo "Saving staging replicas to state.yaml..."
          for service_dir in clusters/staging/*/; do
            service=$(basename "$service_dir")
            values_file="$service_dir/values.yaml"

            if [ -f "$values_file" ]; then
              REPLICAS=$(yq e ".backend.replicaCount" "$values_file")
              if [ "$REPLICAS" != "null" ] && [ -n "$REPLICAS" ]; then
                yq e ".staging.$service = $REPLICAS" -i state.yaml
              fi
            fi
          done

      - name: Update staging targetRevision
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          echo "Updating staging apps to track tag: $TAG"

          # Update all staging Application manifests that reference yas-cd
          for file in apps/staging/*.yaml; do
            # Only update files that reference the yas-cd repo
            if grep -q "repoURL: https://github.com/devops-hcmus/yas-cd" "$file"; then
              # Replace the targetRevision for the yas-cd source only
              # Pattern: line after yas-cd repoURL is targetRevision
              sed -i "/repoURL: https:\/\/github.com\/devops-hcmus\/yas-cd/{n;s/targetRevision: .*/targetRevision: $TAG/}" "$file"
              echo "  Updated: $file"
            fi
          done

      - name: Commit and push
        run: |
          TAG="${{ steps.tag.outputs.TAG }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add all modified files
          git add apps/staging/ clusters/staging/ clusters/dev/ state.yaml

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit — staging already tracks $TAG"
            exit 0
          fi

          # Commit
          git commit -m "cd(staging): update targetRevision to $TAG and manage environment state [skip ci]"

          # Push with retry and proper error handling
          for i in 1 2 3 4 5; do
            # Ensure working directory is clean before pull
            git status --porcelain
            if [ -n "$(git status --porcelain)" ]; then
              echo "ERROR: Uncommitted changes detected before pull"
              git status
              exit 1
            fi

            # Try to push
            if git push; then
              echo "✓ Push successful for tag $TAG"
              exit 0
            fi

            echo "Push attempt $i failed, pulling latest changes..."

            # Pull with rebase
            if ! git pull --rebase origin main; then
              echo "ERROR: Rebase failed on attempt $i"
              git rebase --abort 2>/dev/null || true
              if [ $i -eq 5 ]; then
                echo "ERROR: Failed after 5 attempts"
                exit 1
              fi
            fi

            sleep 5
          done

          echo "ERROR: Failed to push after 5 attempts"
          exit 1

