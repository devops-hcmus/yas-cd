name: GitOps Deploy Dev (Reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Helm chart / gitops cluster folder name (e.g. product, backoffice-ui)"
        required: true
        type: string
      env:
        description: "Target environment: dev or staging"
        required: true
        type: string
      tag:
        description: "Image tag to write into values.yaml"
        required: true
        type: string
      values-key:
        description: "Top-level Helm values key: backend (Java services) or ui (frontend services)"
        required: false
        type: string
        default: "backend"
    secrets:
      gitops_pat:
        required: true

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.gitops_pat }}
          path: gitops

      - name: Read current replicas from state
        id: read_state
        run: |
          cd gitops
          REPLICAS=$(yq e ".dev.${{ inputs.service }}" state.yaml)
          if [ "$REPLICAS" = "null" ] || [ -z "$REPLICAS" ]; then
            REPLICAS=1
          fi
          echo "replicas=$REPLICAS" >> $GITHUB_OUTPUT

      - name: Update image tag and restore replicas
        run: |
          yq e ".${{ inputs.values-key }}.image.tag = \"${{ inputs.tag }}\"" \
            -i gitops/clusters/dev/${{ inputs.service }}/values.yaml
          yq e ".${{ inputs.values-key }}.replicaCount = ${{ steps.read_state.outputs.replicas }}" \
            -i gitops/clusters/dev/${{ inputs.service }}/values.yaml

      - name: Restore all dev services replicas
        run: |
          cd gitops
          for service_dir in clusters/dev/*/; do
            service=$(basename "$service_dir")
            values_file="${service_dir}values.yaml"
            [ -f "$values_file" ] || continue
            [ "$service" = "${{ inputs.service }}" ] && continue

            REPLICAS=$(yq e ".dev.$service" state.yaml)
            [ "$REPLICAS" = "null" ] || [ -z "$REPLICAS" ] && REPLICAS=1

            if yq e '.ui | has("image")' "$values_file" | grep -q "true"; then
              yq e ".ui.replicaCount = $REPLICAS" -i "$values_file"
            elif yq e '.backend | has("image")' "$values_file" | grep -q "true"; then
              yq e ".backend.replicaCount = $REPLICAS" -i "$values_file"
            elif yq e '.reloader | has("reloader")' "$values_file" | grep -q "true"; then
              yq e ".reloader.reloader.enableHA = true" -i "$values_file"
              yq e ".reloader.reloader.deployment.replicas = $REPLICAS" -i "$values_file"
            else
              yq e ".replicaCount = $REPLICAS" -i "$values_file"
            fi
          done
          NGINX_REPLICAS=$(yq e ".dev.nginx" state.yaml)
          [ "$NGINX_REPLICAS" = "null" ] || [ -z "$NGINX_REPLICAS" ] && NGINX_REPLICAS=1
          yq e "(select(.kind == \"Deployment\") | .spec.replicas) = $NGINX_REPLICAS" -i clusters/dev/nginx/nginx.yaml

      - name: Scale down staging
        run: |
          cd gitops
          for service_dir in clusters/staging/*/; do
            values_file="${service_dir}values.yaml"
            [ -f "$values_file" ] || continue
            if yq e '.ui | has("image")' "$values_file" | grep -q "true"; then
              yq e ".ui.replicaCount = 0" -i "$values_file"
            elif yq e '.backend | has("image")' "$values_file" | grep -q "true"; then
              yq e ".backend.replicaCount = 0" -i "$values_file"
            elif yq e '.reloader | has("reloader")' "$values_file" | grep -q "true"; then
              yq e ".reloader.reloader.enableHA = true" -i "$values_file"
              yq e ".reloader.reloader.deployment.replicas = 0" -i "$values_file"
            else
              yq e ".replicaCount = 0" -i "$values_file"
            fi
          done
          yq e "(select(.kind == \"Deployment\") | .spec.replicas) = 0" -i clusters/staging/nginx/nginx.yaml

      - name: Save dev replicas to state
        run: |
          cd gitops
          yq e ".dev.${{ inputs.service }} = ${{ steps.read_state.outputs.replicas }}" -i state.yaml

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "ci-bot"
          git config user.email "ci-bot@devops-hcmus.com"

          git add clusters/dev/
          git add clusters/staging/ state.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore(${{ inputs.service }}): ${{ inputs.env }} -> ${{ inputs.tag }}"

          for i in $(seq 1 15); do
            if [ -n "$(git status --porcelain)" ]; then
              echo "ERROR: Uncommitted changes detected before pull"
              exit 1
            fi

            if git push; then
              exit 0
            fi

            echo "Push attempt $i failed, retrying..."
            if ! git pull --rebase origin main; then
              git rebase --abort 2>/dev/null || true
              [ $i -eq 15 ] && exit 1
            fi

            sleep $((RANDOM % 10 + 5))
          done

          exit 1
