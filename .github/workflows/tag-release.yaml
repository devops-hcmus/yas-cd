name: Tag Release (Staging Deploy)

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Java / Spring Boot services ──────────────────────────────────────────
  build-java:
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: cart
            values-key: backend
          - service: customer
            values-key: backend
          - service: inventory
            values-key: backend
          - service: location
            values-key: backend
          - service: media
            values-key: backend
          - service: order
            values-key: backend
          - service: payment
            values-key: backend
          - service: payment-paypal
            values-key: backend
          - service: product
            values-key: backend
          - service: promotion
            values-key: backend
          - service: rating
            values-key: backend
          - service: recommendation
            values-key: backend
          - service: sampledata
            values-key: backend
          - service: search
            values-key: backend
          - service: tax
            values-key: backend
          - service: webhook
            values-key: backend
          - service: backoffice-bff
            values-key: backend
          - service: storefront-bff
            values-key: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/workflows/actions

      - name: Build
        run: mvn clean install -pl ${{ matrix.service }} -am -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yas-${{ matrix.service }}:${{ github.ref_name }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in gitops
        run: |
          yq e ".${{ matrix.values-key }}.image.tag = \"${{ github.ref_name }}\"" \
            -i gitops/clusters/staging/${{ matrix.service }}/values.yaml

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "ci-bot"
          git config user.email "ci-bot@devops-hcmus.com"
          git add clusters/staging/${{ matrix.service }}/values.yaml
          git diff --staged --quiet || \
            git commit -m "chore(${{ matrix.service }}): staging -> ${{ github.ref_name }}"
          git push

  # ── Frontend services ─────────────────────────────────────────────────────
  build-storefront:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: storefront

      - name: Build
        run: npm run build
        working-directory: storefront

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./storefront
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront:${{ github.ref_name }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in gitops
        run: |
          yq e ".ui.image.tag = \"${{ github.ref_name }}\"" \
            -i gitops/clusters/staging/storefront-ui/values.yaml

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "ci-bot"
          git config user.email "ci-bot@devops-hcmus.com"
          git add clusters/staging/storefront-ui/values.yaml
          git diff --staged --quiet || \
            git commit -m "chore(storefront-ui): staging -> ${{ github.ref_name }}"
          git push

  build-backoffice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: backoffice

      - name: Build
        run: npm run build
        working-directory: backoffice

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backoffice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/yas-backoffice:${{ github.ref_name }}

      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag in gitops
        run: |
          yq e ".ui.image.tag = \"${{ github.ref_name }}\"" \
            -i gitops/clusters/staging/backoffice-ui/values.yaml

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "ci-bot"
          git config user.email "ci-bot@devops-hcmus.com"
          git add clusters/staging/backoffice-ui/values.yaml
          git diff --staged --quiet || \
            git commit -m "chore(backoffice-ui): staging -> ${{ github.ref_name }}"
          git push
