name: Developer Build CD

on:
  workflow_dispatch:
    inputs:
      cart_branch:
        description: 'Branch for cart service'
        required: false
        default: 'main'
      customer_branch:
        description: 'Branch for customer service'
        required: false
        default: 'main'
      inventory_branch:
        description: 'Branch for inventory service'
        required: false
        default: 'main'
      location_branch:
        description: 'Branch for location service'
        required: false
        default: 'main'
      media_branch:
        description: 'Branch for media service'
        required: false
        default: 'main'
      order_branch:
        description: 'Branch for order service'
        required: false
        default: 'main'
      payment_branch:
        description: 'Branch for payment service'
        required: false
        default: 'main'
      payment_paypal_branch:
        description: 'Branch for payment-paypal service'
        required: false
        default: 'main'
      product_branch:
        description: 'Branch for product service'
        required: false
        default: 'main'
      promotion_branch:
        description: 'Branch for promotion service'
        required: false
        default: 'main'
      rating_branch:
        description: 'Branch for rating service'
        required: false
        default: 'main'
      recommendation_branch:
        description: 'Branch for recommendation service'
        required: false
        default: 'main'
      search_branch:
        description: 'Branch for search service'
        required: false
        default: 'main'
      tax_branch:
        description: 'Branch for tax service'
        required: false
        default: 'main'
      webhook_branch:
        description: 'Branch for webhook service'
        required: false
        default: 'main'
      backoffice_bff_branch:
        description: 'Branch for backoffice-bff service'
        required: false
        default: 'main'
      storefront_bff_branch:
        description: 'Branch for storefront-bff service'
        required: false
        default: 'main'
      storefront_branch:
        description: 'Branch for storefront frontend'
        required: false
        default: 'main'
      backoffice_branch:
        description: 'Branch for backoffice frontend'
        required: false
        default: 'main'
      sampledata_branch:
        description: 'Branch for sampledata service'
        required: false
        default: 'main'
      base_namespace:
        description: 'Base K8s namespace prefix'
        required: false
        default: 'yas-dev'

jobs:
  get-commit-ids:
    runs-on: self-hosted
    outputs:
      cart_tag: ${{ steps.cart.outputs.tag }}
      customer_tag: ${{ steps.customer.outputs.tag }}
      inventory_tag: ${{ steps.inventory.outputs.tag }}
      location_tag: ${{ steps.location.outputs.tag }}
      media_tag: ${{ steps.media.outputs.tag }}
      order_tag: ${{ steps.order.outputs.tag }}
      payment_tag: ${{ steps.payment.outputs.tag }}
      payment_paypal_tag: ${{ steps.payment_paypal.outputs.tag }}
      product_tag: ${{ steps.product.outputs.tag }}
      promotion_tag: ${{ steps.promotion.outputs.tag }}
      rating_tag: ${{ steps.rating.outputs.tag }}
      recommendation_tag: ${{ steps.recommendation.outputs.tag }}
      search_tag: ${{ steps.search.outputs.tag }}
      tax_tag: ${{ steps.tax.outputs.tag }}
      webhook_tag: ${{ steps.webhook.outputs.tag }}
      backoffice_bff_tag: ${{ steps.backoffice_bff.outputs.tag }}
      storefront_bff_tag: ${{ steps.storefront_bff.outputs.tag }}
      storefront_tag: ${{ steps.storefront.outputs.tag }}
      backoffice_tag: ${{ steps.backoffice.outputs.tag }}
      sampledata_tag: ${{ steps.sampledata.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Fetch origin branches
        run: |
          git fetch origin ${{ inputs.cart_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.customer_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.inventory_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.location_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.media_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.order_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.payment_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.payment_paypal_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.product_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.promotion_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.rating_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.recommendation_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.search_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.tax_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.webhook_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.backoffice_bff_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.storefront_bff_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.storefront_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.backoffice_branch }} --depth=1 2>/dev/null || true
          git fetch origin ${{ inputs.sampledata_branch }} --depth=1 2>/dev/null || true

      - name: Resolve tags
        id: resolve_tags
        run: |
          # Helper function to assign main tag or commit SHA
          resolve_tag() {
            local branch=$1
            if [ "$branch" = "main" ]; then
              echo "main"
            else
              git rev-parse --short origin/$branch 2>/dev/null || echo "unknown"
            fi
          }

          echo "cart_tag=$(resolve_tag ${{ inputs.cart_branch }})" >> $GITHUB_ENV
          echo "customer_tag=$(resolve_tag ${{ inputs.customer_branch }})" >> $GITHUB_ENV
          echo "inventory_tag=$(resolve_tag ${{ inputs.inventory_branch }})" >> $GITHUB_ENV
          echo "location_tag=$(resolve_tag ${{ inputs.location_branch }})" >> $GITHUB_ENV
          echo "media_tag=$(resolve_tag ${{ inputs.media_branch }})" >> $GITHUB_ENV
          echo "order_tag=$(resolve_tag ${{ inputs.order_branch }})" >> $GITHUB_ENV
          echo "payment_tag=$(resolve_tag ${{ inputs.payment_branch }})" >> $GITHUB_ENV
          echo "payment_paypal_tag=$(resolve_tag ${{ inputs.payment_paypal_branch }})" >> $GITHUB_ENV
          echo "product_tag=$(resolve_tag ${{ inputs.product_branch }})" >> $GITHUB_ENV
          echo "promotion_tag=$(resolve_tag ${{ inputs.promotion_branch }})" >> $GITHUB_ENV
          echo "rating_tag=$(resolve_tag ${{ inputs.rating_branch }})" >> $GITHUB_ENV
          echo "recommendation_tag=$(resolve_tag ${{ inputs.recommendation_branch }})" >> $GITHUB_ENV
          echo "search_tag=$(resolve_tag ${{ inputs.search_branch }})" >> $GITHUB_ENV
          echo "tax_tag=$(resolve_tag ${{ inputs.tax_branch }})" >> $GITHUB_ENV
          echo "webhook_tag=$(resolve_tag ${{ inputs.webhook_branch }})" >> $GITHUB_ENV
          echo "backoffice_bff_tag=$(resolve_tag ${{ inputs.backoffice_bff_branch }})" >> $GITHUB_ENV
          echo "storefront_bff_tag=$(resolve_tag ${{ inputs.storefront_bff_branch }})" >> $GITHUB_ENV
          echo "storefront_tag=$(resolve_tag ${{ inputs.storefront_branch }})" >> $GITHUB_ENV
          echo "backoffice_tag=$(resolve_tag ${{ inputs.backoffice_branch }})" >> $GITHUB_ENV
          echo "sampledata_tag=$(resolve_tag ${{ inputs.sampledata_branch }})" >> $GITHUB_ENV

      # Mapping ENV to Job Outputs
      - id: cart
        run: echo "tag=${{ env.cart_tag }}" >> $GITHUB_OUTPUT
      - id: customer
        run: echo "tag=${{ env.customer_tag }}" >> $GITHUB_OUTPUT
      - id: inventory
        run: echo "tag=${{ env.inventory_tag }}" >> $GITHUB_OUTPUT
      - id: location
        run: echo "tag=${{ env.location_tag }}" >> $GITHUB_OUTPUT
      - id: media
        run: echo "tag=${{ env.media_tag }}" >> $GITHUB_OUTPUT
      - id: order
        run: echo "tag=${{ env.order_tag }}" >> $GITHUB_OUTPUT
      - id: payment
        run: echo "tag=${{ env.payment_tag }}" >> $GITHUB_OUTPUT
      - id: payment_paypal
        run: echo "tag=${{ env.payment_paypal_tag }}" >> $GITHUB_OUTPUT
      - id: product
        run: echo "tag=${{ env.product_tag }}" >> $GITHUB_OUTPUT
      - id: promotion
        run: echo "tag=${{ env.promotion_tag }}" >> $GITHUB_OUTPUT
      - id: rating
        run: echo "tag=${{ env.rating_tag }}" >> $GITHUB_OUTPUT
      - id: recommendation
        run: echo "tag=${{ env.recommendation_tag }}" >> $GITHUB_OUTPUT
      - id: search
        run: echo "tag=${{ env.search_tag }}" >> $GITHUB_OUTPUT
      - id: tax
        run: echo "tag=${{ env.tax_tag }}" >> $GITHUB_OUTPUT
      - id: webhook
        run: echo "tag=${{ env.webhook_tag }}" >> $GITHUB_OUTPUT
      - id: backoffice_bff
        run: echo "tag=${{ env.backoffice_bff_tag }}" >> $GITHUB_OUTPUT
      - id: storefront_bff
        run: echo "tag=${{ env.storefront_bff_tag }}" >> $GITHUB_OUTPUT
      - id: storefront
        run: echo "tag=${{ env.storefront_tag }}" >> $GITHUB_OUTPUT
      - id: backoffice
        run: echo "tag=${{ env.backoffice_tag }}" >> $GITHUB_OUTPUT
      - id: sampledata
        run: echo "tag=${{ env.sampledata_tag }}" >> $GITHUB_OUTPUT

  deploy:
    needs: get-commit-ids
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Dynamic Namespace
        id: gen-namespace
        run: |
          RAW_NS="${{ inputs.base_namespace }}-${{ github.actor }}-${{ github.run_number }}"
          CLEAN_NS=$(echo "$RAW_NS" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9-')
          echo "TARGET_NAMESPACE=$CLEAN_NS" >> $GITHUB_ENV

      - name: Ensure Namespace Exists
        run: |
          kubectl get namespace ${{ env.TARGET_NAMESPACE }} || kubectl create namespace ${{ env.TARGET_NAMESPACE }}

      - name: Update Helm Dependencies
        run: |
          # Update dependencies for all charts that have them
          for chart_dir in k8s/charts/*/; do
            if [ -f "$chart_dir/Chart.yaml" ]; then
              # Check if Chart.yaml has dependencies
              if grep -q "dependencies:" "$chart_dir/Chart.yaml"; then
                echo "Updating dependencies for $(basename $chart_dir)..."
                helm dependency update "$chart_dir" --skip-refresh
              fi
            fi
          done

      - name: Deploy Services via Helm
        run: |
          # Deploy backend services with custom image tags
          helm upgrade --install cart k8s/charts/cart \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-cart \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.cart_tag }} || true
          
          helm upgrade --install customer k8s/charts/customer \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-customer \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.customer_tag }} || true
          
          helm upgrade --install inventory k8s/charts/inventory \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-inventory \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.inventory_tag }} || true
          
          helm upgrade --install location k8s/charts/location \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-location \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.location_tag }} || true
          
          helm upgrade --install media k8s/charts/media \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-media \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.media_tag }} || true
          
          helm upgrade --install order k8s/charts/order \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-order \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.order_tag }} || true
          
          helm upgrade --install payment k8s/charts/payment \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-payment \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.payment_tag }} || true
          
          helm upgrade --install payment-paypal k8s/charts/payment-paypal \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-payment-paypal \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.payment_paypal_tag }} || true
          
          helm upgrade --install product k8s/charts/product \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-product \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.product_tag }} || true
          
          helm upgrade --install promotion k8s/charts/promotion \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-promotion \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.promotion_tag }} || true
          
          helm upgrade --install rating k8s/charts/rating \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-rating \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.rating_tag }} || true
          
          helm upgrade --install recommendation k8s/charts/recommendation \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-recommendation \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.recommendation_tag }} || true
          
          helm upgrade --install search k8s/charts/search \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-search \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.search_tag }} || true
          
          helm upgrade --install tax k8s/charts/tax \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-tax \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.tax_tag }} || true
          
          helm upgrade --install webhook k8s/charts/webhook \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-webhook \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.webhook_tag }} || true
          
          helm upgrade --install backoffice-bff k8s/charts/backoffice-bff \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-backoffice-bff \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.backoffice_bff_tag }} || true
          
          helm upgrade --install storefront-bff k8s/charts/storefront-bff \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront-bff \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.storefront_bff_tag }} || true
          
          helm upgrade --install storefront-ui k8s/charts/storefront-ui \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set ui.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-storefront \
            --set ui.image.tag=${{ needs.get-commit-ids.outputs.storefront_tag }} || true
          
          helm upgrade --install backoffice-ui k8s/charts/backoffice-ui \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set ui.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-backoffice \
            --set ui.image.tag=${{ needs.get-commit-ids.outputs.backoffice_tag }} || true
          
          helm upgrade --install sampledata k8s/charts/sampledata \
            --namespace ${{ env.TARGET_NAMESPACE }} \
            --set backend.image.repository=${{ secrets.DOCKERHUB_USERNAME }}/yas-sampledata \
            --set backend.image.tag=${{ needs.get-commit-ids.outputs.sampledata_tag }} || true

      - name: Wait for Rollout Status
        run: |
          kubectl rollout status deployment --all -n ${{ env.TARGET_NAMESPACE }} --timeout=5m || true

      - name: Get Worker Node IP
        id: worker-ip
        run: |
          # Check if Minikube is being used
          IS_MINIKUBE=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' | grep -q "minikube" && echo "true" || echo "false")
          
          if [ "$IS_MINIKUBE" = "true" ]; then
            # For Minikube: try to get VM IP from node status
            WORKER_IP=$(kubectl get nodes minikube -o jsonpath='{.status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || echo "")
            
            if [ -z "$WORKER_IP" ]; then
              WORKER_IP=$(kubectl get nodes minikube -o jsonpath='{.status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "")
            fi
            
            # If still empty, try hostname which could be IP
            if [ -z "$WORKER_IP" ]; then
              WORKER_IP=$(kubectl get nodes minikube -o jsonpath='{.status.addresses[?(@.type=="Hostname")].address}' 2>/dev/null || echo "")
            fi
          else
            # For multi-node clusters: try to get ExternalIP first, fallback to InternalIP
            WORKER_IP=$(kubectl get nodes --selector='!node-role.kubernetes.io/master' \
              -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || echo "")
            
            if [ -z "$WORKER_IP" ]; then
              WORKER_IP=$(kubectl get nodes --selector='!node-role.kubernetes.io/master' \
                -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "")
            fi
            
            # If no selector match, get first node
            if [ -z "$WORKER_IP" ]; then
              WORKER_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}' 2>/dev/null || echo "")
            fi
            
            if [ -z "$WORKER_IP" ]; then
              WORKER_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}' 2>/dev/null || echo "")
            fi
          fi
          
          if [ -z "$WORKER_IP" ]; then
            WORKER_IP="<WORKER_NODE_IP>"
          fi
          
          echo "WORKER_IP=$WORKER_IP" >> $GITHUB_ENV
          echo "worker_ip=$WORKER_IP" >> $GITHUB_OUTPUT

      - name: Publish Summary Report
        run: |
          echo "## 🎉 Deployment Completed Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Deployment Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** \`${{ env.TARGET_NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By:** \`${{ github.actor }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Worker Node IP:** \`${{ steps.worker-ip.outputs.worker_ip }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Service Access Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### How to Access Services:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. **Add entries to your /etc/hosts file:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Add this line to /etc/hosts (Linux/Mac: /etc/hosts, Windows: C:\\\\Windows\\\\System32\\\\drivers\\\\etc\\\\hosts)" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.worker-ip.outputs.worker_ip }} yas.local" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "2. **Service Endpoints (NodePort):**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n ${{ env.TARGET_NAMESPACE }} -o custom-columns=SERVICE:.metadata.name,TYPE:.spec.type,INTERNAL-PORT:.spec.ports[0].port,NODEPORT:.spec.ports[0].nodePort --no-headers 2>/dev/null | while read SERVICE TYPE PORT NODEPORT; do
            [ -z "$NODEPORT" ] && NODEPORT="N/A"
            [ "$NODEPORT" != "N/A" ] && echo "$SERVICE: ${{ steps.worker-ip.outputs.worker_ip }}:$NODEPORT (Port: $PORT)" || echo "$SERVICE: No NodePort"
          done >> $GITHUB_STEP_SUMMARY || echo "Unable to retrieve services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Image Tags Applied" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Tag | Branch |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| cart | \`${{ needs.get-commit-ids.outputs.cart_tag }}\` | \`${{ inputs.cart_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| customer | \`${{ needs.get-commit-ids.outputs.customer_tag }}\` | \`${{ inputs.customer_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| inventory | \`${{ needs.get-commit-ids.outputs.inventory_tag }}\` | \`${{ inputs.inventory_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| location | \`${{ needs.get-commit-ids.outputs.location_tag }}\` | \`${{ inputs.location_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| media | \`${{ needs.get-commit-ids.outputs.media_tag }}\` | \`${{ inputs.media_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| order | \`${{ needs.get-commit-ids.outputs.order_tag }}\` | \`${{ inputs.order_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| payment | \`${{ needs.get-commit-ids.outputs.payment_tag }}\` | \`${{ inputs.payment_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| payment-paypal | \`${{ needs.get-commit-ids.outputs.payment_paypal_tag }}\` | \`${{ inputs.payment_paypal_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| product | \`${{ needs.get-commit-ids.outputs.product_tag }}\` | \`${{ inputs.product_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| promotion | \`${{ needs.get-commit-ids.outputs.promotion_tag }}\` | \`${{ inputs.promotion_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| rating | \`${{ needs.get-commit-ids.outputs.rating_tag }}\` | \`${{ inputs.rating_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| recommendation | \`${{ needs.get-commit-ids.outputs.recommendation_tag }}\` | \`${{ inputs.recommendation_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| search | \`${{ needs.get-commit-ids.outputs.search_tag }}\` | \`${{ inputs.search_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| tax | \`${{ needs.get-commit-ids.outputs.tax_tag }}\` | \`${{ inputs.tax_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| webhook | \`${{ needs.get-commit-ids.outputs.webhook_tag }}\` | \`${{ inputs.webhook_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| backoffice-bff | \`${{ needs.get-commit-ids.outputs.backoffice_bff_tag }}\` | \`${{ inputs.backoffice_bff_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| storefront-bff | \`${{ needs.get-commit-ids.outputs.storefront_bff_tag }}\` | \`${{ inputs.storefront_bff_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| storefront | \`${{ needs.get-commit-ids.outputs.storefront_tag }}\` | \`${{ inputs.storefront_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| backoffice | \`${{ needs.get-commit-ids.outputs.backoffice_tag }}\` | \`${{ inputs.backoffice_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| sampledata | \`${{ needs.get-commit-ids.outputs.sampledata_tag }}\` | \`${{ inputs.sampledata_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Pods Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.TARGET_NAMESPACE }} -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found." >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
