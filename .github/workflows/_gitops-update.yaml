name: GitOps Update (Reusable)

on:
  workflow_call:
    inputs:
      service:
        description: "Helm chart / gitops cluster folder name (e.g. product, backoffice-ui)"
        required: true
        type: string
      env:
        description: "Target environment: dev or staging"
        required: true
        type: string
      tag:
        description: "Image tag to write into values.yaml"
        required: true
        type: string
      values-key:
        description: "Top-level Helm values key: backend (Java services) or ui (frontend services)"
        required: false
        type: string
        default: "backend"
    secrets:
      gitops_pat:
        required: true

jobs:
  update-gitops:
    runs-on: ubuntu-latest
    steps:
      - name: Install yq
        uses: mikefarah/yq@v4.44.1

      - name: Checkout gitops repo
        uses: actions/checkout@v4
        with:
          repository: devops-hcmus/gitops
          token: ${{ secrets.gitops_pat }}
          path: gitops

      - name: Read current replicas from state (dev only)
        if: ${{ inputs.env == 'dev' }}
        id: read_state
        run: |
          cd gitops
          REPLICAS=$(yq e ".dev.${{ inputs.service }}" state.yaml)
          if [ "$REPLICAS" = "null" ] || [ -z "$REPLICAS" ]; then
            REPLICAS=1
          fi
          echo "replicas=$REPLICAS" >> $GITHUB_OUTPUT
          echo "Read dev.${{ inputs.service }} replicas: $REPLICAS"

      - name: Update image tag and restore replicas (dev)
        if: ${{ inputs.env == 'dev' }}
        run: |
          yq e ".${{ inputs.values-key }}.image.tag = \"${{ inputs.tag }}\"" \
            -i gitops/clusters/${{ inputs.env }}/${{ inputs.service }}/values.yaml
          yq e ".${{ inputs.values-key }}.replicaCount = ${{ steps.read_state.outputs.replicas }}" \
            -i gitops/clusters/${{ inputs.env }}/${{ inputs.service }}/values.yaml

      - name: Update image tag (staging)
        if: ${{ inputs.env == 'staging' }}
        run: |
          yq e ".${{ inputs.values-key }}.image.tag = \"${{ inputs.tag }}\"" \
            -i gitops/clusters/${{ inputs.env }}/${{ inputs.service }}/values.yaml

      - name: Scale down opposite environment (dev -> staging)
        if: ${{ inputs.env == 'dev' }}
        run: |
          cd gitops
          echo "Scaling all staging services to 0 replicas..."
          for service_dir in clusters/staging/*/; do
            service=$(basename "$service_dir")
            values_file="$service_dir/values.yaml"
            if [ -f "$values_file" ]; then
              yq e ".backend.replicaCount = 0" -i "$values_file"
              echo "  ✓ $service: replicaCount = 0"
            fi
          done

      - name: Save dev replicas to state
        if: ${{ inputs.env == 'dev' }}
        run: |
          cd gitops
          yq e ".dev.${{ inputs.service }} = ${{ steps.read_state.outputs.replicas }}" -i state.yaml
          echo "Saved dev.${{ inputs.service }} = ${{ steps.read_state.outputs.replicas }} to state.yaml"

      - name: Commit and push
        run: |
          cd gitops
          git config user.name "ci-bot"
          git config user.email "ci-bot@devops-hcmus.com"
          git add clusters/${{ inputs.env }}/${{ inputs.service }}/values.yaml
          if [ "${{ inputs.env }}" = "dev" ]; then
            git add state.yaml
          fi
          git diff --staged --quiet || \
            git commit -m "chore(${{ inputs.service }}): ${{ inputs.env }} -> ${{ inputs.tag }}"
          for i in 1 2 3 4 5; do
            git pull --rebase && git push && break
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
